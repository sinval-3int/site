<!-- PÁGINA 34 - RESET, SELECT E TEXTAREA | extensão da pág.33: form completo com todos os tipos de campo -->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Site da Teté - Livro de Visitas Completo</title>
    <link rel="stylesheet" href="pagina34.css" />
  </head>
  <body>
    <h2>Deixe um recadinho pra Teté</h2>
    <form class="form-tete" action="#" method="post">
      <label><input type="text" class="campo" name="nome" placeholder="Seu nome" /></label><br />
      <label
        >Grau de parentesco:
        <select class="campo" name="parentesco">
          <option value="mae">Mãe</option>
          <option value="pai">Pai</option>
          <option value="avo">Avó/Avô</option>
          <option value="amigo">Amigo(a)</option>
        </select> </label
      ><br />
      <label
        >Recado:<br />
        <textarea class="campo" name="recado" rows="4" cols="30"></textarea></label
      ><br />
      <input class="botao-enviar" type="submit" value="Enviar recadinho" />
      <input class="botao-limpar" type="reset" value="Limpar" />
    </form>
  </body>
</html>
