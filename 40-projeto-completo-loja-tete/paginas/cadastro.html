<!-- PÁGINA 40 - LOJA DA TETÉ: CADASTRO | sem menu de navegação (regra do projeto), só volta pro login -->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Loja da Teté - Cadastro</title>
    <link rel="stylesheet" href="/estilos/cadastro.css" />
  </head>
  <body>
    <div class="caixa-login">
      <img class="logo" src="/imagens/tete3.jpg" alt="Logo Site da Teté" />
      <h1>Criar Conta</h1>
      <form class="form-tete" action="/paginas/login.html" method="get">
        <label
          >Nome:<br />
          <input class="campo" type="text" name="nome" placeholder="Seu nome" /> </label
        ><br />
        <label
          >E-mail:<br />
          <input class="campo" type="text" name="email" placeholder="seuemail@exemplo.com" /> </label
        ><br />
        <label
          >Senha:<br />
          <input class="campo" type="password" name="senha" /> </label
        ><br />
        <label
          >Confirmar senha:<br />
          <input class="campo" type="password" name="confirmar_senha" /> </label
        ><br />
        <input class="botao-enviar" type="submit" value="Cadastrar" />
      </form>
      <p><a class="link-simples" href="/paginas/login.html">Já tem conta? Entrar</a></p>
    </div>
  </body>
</html>
