<!-- PÁGINA 40 - LOJA DA TETÉ: LOGIN | sem menu de navegação (regra do projeto) -->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Loja da Teté - Entrar</title>
    <link rel="stylesheet" href="../estilos/login.css" />
  </head>
  <body>
    <div class="caixa-login">
      <img class="logo" src="../imagens/logo-tete.svg" alt="Logo Site da Teté" />
      <h1>Entrar</h1>
      <form class="form-tete" action="inicio.html" method="get">
        <label
          >E-mail:<br />
          <input class="campo" type="text" name="email" placeholder="seuemail@exemplo.com" /> </label
        ><br />
        <label
          >Senha:<br />
          <input class="campo" type="password" name="senha" /> </label
        ><br />
        <input class="botao-enviar" type="submit" value="Entrar" />
      </form>
      <p><a class="link-simples" href="cadastro.html">Não tem conta? Cadastre-se</a></p>
      <p><a class="link-simples" href="recuperar-senha.html">Esqueceu a senha? Recuperar conta</a></p>
    </div>
  </body>
</html>
