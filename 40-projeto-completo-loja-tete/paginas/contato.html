<!-- PÁGINA 40 - LOJA DA TETÉ: CONTATO | tem menu de navegação + formulário (pág.31-36) -->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Loja da Teté - Contato</title>
    <link rel="stylesheet" href="../estilos/contato.css" />
  </head>
  <body>
    <nav class="menu-tete">
      <a href="inicio.html">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
      <a class="botao-sair" href="login.html">Sair</a>
    </nav>

    <main class="conteudo">
      <h1>Fale com a Loja da Teté</h1>
      <form class="form-tete" action="#" method="post">
        <label
          >Seu nome:<br />
          <input class="campo" type="text" name="nome" placeholder="Seu nome" /> </label
        ><br />
        <label
          >Seu e-mail:<br />
          <input class="campo" type="text" name="email" placeholder="seuemail@exemplo.com" /> </label
        ><br />
        <label
          >Mensagem:<br />
          <textarea class="campo" name="mensagem" rows="4" cols="30"></textarea></label
        ><br />
        <input class="botao-enviar" type="submit" value="Enviar mensagem" />
        <input class="botao-limpar" type="reset" value="Limpar" />
      </form>
    </main>
  </body>
</html>
