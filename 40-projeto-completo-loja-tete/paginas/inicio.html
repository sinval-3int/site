<!-- PÁGINA 40 - LOJA DA TETÉ: INÍCIO | tem menu de navegação + vitrine de 6 produtos -->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Loja da Teté - Início</title>
    <link rel="stylesheet" href="../estilos/inicio.css" />
  </head>
  <body>
    <nav class="menu-tete">
      <a href="inicio.html">Início</a>
      <a href="produtos.html">Produtos</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
      <a class="icone-carrinho" href="#" aria-label="Carrinho de compras" title="Carrinho de compras">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
      </a>
      <a class="botao-sair" href="login.html">Sair</a>
    </nav>

    <header class="capa-loja">
      <img class="logo" src="/imagens/tete4.jpg" alt="Logo Site da Teté" />
      <h1>Loja da Teté</h1>
      <p>Produtos fofos pra bebês de 0 a 2 aninhos</p>
    </header>

    <main>
      <h2 class="titulo-secao">
        <marquee behavior="scroll" direction="left">Produtos em Destaque</marquee>
      </h2>
      <section class="vitrine">
        <article class="produto">
          <img src="../imagens/produtos/bolo1.jpg" alt="Bolo" />
          <h3>Bolo</h3>
          <p class="preco">R$ 45,00</p>
          <button class="botao-enviar">Adicionar</button>
        </article>
        <article class="produto">
          <img src="../imagens/produtos/gol1.JPG" alt="Gol" />
          <h3>Gol</h3>
          <p class="preco">R$ 149,90</p>
          <button class="botao-enviar">Adicionar</button>
        </article>
        <article class="produto">
          <img src="../imagens/produtos/carnaval1.jpg" alt="Carnaval" />
          <h3>Carnaval</h3>
          <p class="preco">R$ 59,90</p>
          <button class="botao-enviar">Adicionar</button>
        </article>
        <article class="produto">
          <img src="../imagens/produtos/pisca-pisca1.jpg" alt="Pisca-Pisca" />
          <h3>Pisca-Pisca</h3>
          <p class="preco">R$ 19,90</p>
          <button class="botao-enviar">Adicionar</button>
        </article>
      </section>
      <p class="link-ver-todos">
        <a href="produtos.html">Ver todos os produtos</a>
      </p>
    </main>
  </body>
</html>
